services:
  warehouse:
    image: postgres:13
    container_name: qd_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qbnet
  warehouseui:
    image: dpage/pgadmin4
    container_name: qb_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      warehouse:
        condition: service_healthy
    networks:
      - qbnet

  scheduler:
    build: .
    container_name: qb_mageai
    command: /app/run_app.sh mage start
    volumes:
      - "./scheduler_data:/home/src:rw"
    ports:
      - "6789:6789"
    depends_on:
      warehouse:
        condition: service_healthy
    networks:
      - qbnet
networks:
  qbnet:
    driver: bridge
